version: '3.8'

services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}      
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./chroma_db:/app/chroma_db   # persist vector store
    depends_on:
      - redis
    restart: unless-stopped